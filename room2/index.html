/* --- HITBOXES --- */
.hitbox {
    position: absolute;
    background: rgba(255, 0, 0, 0.2); /* Tinted for editing; change 0.2 to 0.0 to hide completely */
    border: 2px dashed #ff0000;      /* Remove this line when your game is finished! */
    cursor: pointer;
    box-sizing: border-box;
    z-index: 2;
}
.hitbox:hover {
    background: rgba(255, 0, 0, 0.4);
}

/* Hitbox Coordinates */
.obj-volleyball { top: 58%; left: 3%; width: 8%; height: 12%; }

/* --- DIALOGUE OVERLAY (The Magic Multi-click Shield) --- */
#click-overlay {
    display: none; /* Hidden by default, turns on during dialogue */
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 5; /* Sits above hitboxes so you can't click other items mid-story */
    cursor: pointer;
}

/* --- IMAGE POPUP CONTAINER --- */
#image-popup-container {
    display: none; /* Hidden until a script triggers it */
    position: absolute;
    top: 10%;
    left: 25%;

    z-index: 6; /* Appears above the click overlay */
    background: rgba(0,0,0,0.8);

    padding: 10px;
    box-sizing: border-box;
}
#popup-image {
    width: 100%;

}

}

// 2. GAME STATE TRACKERS
let currentObject = null;
let currentStep = 0;

// 3. START AN INTERACTION (When clicking an object hitbox)
function startInteraction(objectKey) {
    currentObject = objectKey;
    currentStep = 0;
    
    // Turn on the giant transparent click shield so player can't click other items
    document.getElementById("click-overlay").style.display = "block";
    document.getElementById("click-prompt").style.display = "inline";
    
    // Play the very first line
    renderStep();
}

// 4. DISPLAY THE CURRENT STEP
function renderStep() {
    const steps = gameData[currentObject];
    
    // Check if we ran out of steps for this object
    if (currentStep >= steps.length) {
        endInteraction();
        return;
    }
    
    const currentData = steps[currentStep];
    
    if (currentData.type === "text") {
        // Hide image popup if it was open from a previous step
        document.getElementById("image-popup-container").style.display = "none";
        
        // Show text line
        document.getElementById("dialogue-display").innerText = currentData.content;
    } 
    else if (currentData.type === "image") {
        // Load the image link and show the popup container
        document.getElementById("popup-image").src = currentData.content;
        document.getElementById("image-popup-container").style.display = "block";
        
        // Give optional context text under/inside the box if you want
        document.getElementById("dialogue-display").innerText = "[You found a clue!]";
    }
}

// 5. ADVANCE THE DIALOGUE (When clicking anywhere during a scene)
function advanceDialogue() {
    if (!currentObject) return; // Do nothing if a scene isn't active
    
    currentStep++;
    renderStep();
}

// 6. END INTERACTION (Resets to main exploration state)
function endInteraction() {
    currentObject = null;
    currentStep = 0;
    
    // Hide everything that was locked during the scene
    document.getElementById("click-overlay").style.display = "none";
    document.getElementById("image-popup-container").style.display = "none";
    document.getElementById("click-prompt").style.display = "none";
    
    // Reset standard text box instruction
    document.getElementById("dialogue-display").innerText = "Click on an object in the bedroom to investigate...";
}</script></div></div></article></main><footer class="footer"><div class="wrapper"><div class="footer__copyright">Powered by Publii</div><button id="backToTop" class="footer__bttop" aria-label="Back to top" title="Back to top"><svg width="20" height="20"><use xlink:href="https://rajivkaggarwal.github.io/gayeon.kim/assets/svg/svg-map.svg#toparrow"/></svg></button></div></footer><script defer="defer" src="https://rajivkaggarwal.github.io/gayeon.kim/assets/js/scripts.min.js?v=dafec4f87fead6718cb125f0b0fc8441"></script><script>window.publiiThemeMenuConfig={mobileMenuMode:'sidebar',animationSpeed:300,submenuWidth: 'auto',doubleClickTime:500,mobileMenuExpandableSubmenus:true,relatedContainerForOverlayMenuSelector:'.top'};</script><script>var images = document.querySelectorAll('img[loading]');
