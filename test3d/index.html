                }</style></noscript><script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script><script src="https://unpkg.com/@c-frame/aframe-particle-system-component@1.2.x/dist/aframe-particle-system-component.min.js"></script><script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.5.0/dist/aframe-extras.min.js"></script><script src="https://cdn.jsdelivr.net/npm/@fern-solutions/aframe-sky-background/dist/sky-background.umd.min.js"></script></head><body class="page-template"><div><div style="text-align: center; background: #222; color: #fff; padding: 20px; border-radius: 8px; font-family: sans-serif;"><h2 id="game-text">You wake up in a dark room. There is a red button and a blue button.</h2><br><button id="btn1" onclick="chooseOption(1)" style="padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer;">Press Red Button</button> <button id="btn2" onclick="chooseOption(2)" style="padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer;">Press Blue Button</button></div><script>// This function runs whenever a button is clicked
    function chooseOption(choice) {
        const textElement = document.getElementById("game-text");
        const button1 = document.getElementById("btn1");
        const button2 = document.getElementById("btn2");

        if (choice === 1) {
            textElement.innerText = "The red button triggered an alarm! A secret door opens.";
            button1.innerText = "Enter the door";
            button2.innerText = "Stay put";
            // Change what happens on the next click
            button1.setAttribute("onclick", "finishGame('win')");
            button2.setAttribute("onclick", "finishGame('lose')");
        } else if (choice === 2) {
            textElement.innerText = "The blue button flooded the room with confetti! You win!";
            button1.style.display = "none";
            button2.style.display = "none";
        }
    }

    function finishGame(outcome) {
        const textElement = document.getElementById("game-text");
        if (outcome === 'win') {
            textElement.innerText = "You escaped the room! Game Over - You Win!";
        } else {
            textElement.innerText = "You waited too long. Game Over!";
        }
        document.getElementById("btn1").style.display = "none";
        document.getElementById("btn2").style.display = "none";
    }

    // Optional: Listening for the Spacebar to trigger an event
    window.addEventListener("keydown", function(event) {
        if (event.code === "Space") {
            // Prevent spacebar from scrolling the webpage down
            event.preventDefault(); 
            document.getElementById("game-text").innerText = "You tapped the Spacebar! A hidden trapdoor shakes...";
        }
    });</script></div></body></html>
